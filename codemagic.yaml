workflows:
  ios-depth-tracker:
    name: DepthTracker iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jforde.DepthTracker
      xcode: 16.2
      vars:
        XCODE_PROJECT: "DepthTracker.xcodeproj"
        XCODE_SCHEME: "DepthTracker"
    integrations:
      app_store_connect: DepthApp
    scripts:
      - name: Install XcodeGen and generate project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: DepthApp
        key_id: Y6YR6N9GV6
        issuer_id: 9b206a17-174f-4125-9733-042754d65886
        submit_to_testflight: true
      email:
        recipients:
          - jforde2015@gmail.com
        notify:
          success: true
          failure: true
