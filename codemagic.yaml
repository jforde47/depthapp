workflows:
  ios-depth-tracker:
    name: DepthTracker iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jforde.DepthTracker
      xcode: 16.2
      vars:
        XCODE_PROJECT: "DepthTracker.xcodeproj"
        XCODE_SCHEME: "DepthTracker"
    integrations:
      app_store_connect: DepthApp
    scripts:
      - name: Install XcodeGen and generate project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
      - name: Publish to TestFlight
        script: |
          app-store-connect publish \
            --path $(find build/ios/ipa -name "*.ipa") \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "@file:$HOME/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8" \
            --testflight
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - jforde2015@gmail.com
        notify:
          success: true
          failure: true
