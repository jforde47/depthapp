workflows:
  ios-depth-tracker:
    name: DepthTracker iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jforde.DepthTracker
      xcode: 16.2
      vars:
        XCODE_PROJECT: "DepthTracker.xcodeproj"
        XCODE_SCHEME: "DepthTracker"
    integrations:
      app_store_connect: DepthApp
    scripts:
      - name: Install XcodeGen and generate project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
      - name: Publish to TestFlight
        script: |
          echo "APP_STORE_CONNECT_PRIVATE_KEY length: ${#APP_STORE_CONNECT_PRIVATE_KEY}"
          echo "APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 -d -i > /tmp/api_key.p8 2>/dev/null || echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/api_key.p8
          echo "Key file size: $(wc -c < /tmp/api_key.p8)"
          head -1 /tmp/api_key.p8
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - jforde2015@gmail.com
        notify:
          success: true
          failure: true
