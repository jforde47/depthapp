workflows:
  ios-depth-tracker:
    name: DepthTracker iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jforde.DepthTracker
      xcode: 16.2
      vars:
        XCODE_PROJECT: "DepthTracker.xcodeproj"
        XCODE_SCHEME: "DepthTracker"
    integrations:
      app_store_connect: DepthApp
    scripts:
      - name: Generate app icon and assets
        script: |
          ICON_DIR="DepthTracker/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          python3 -c "
          import struct, zlib
          def make_png(w, h, r, g, b):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              raw = b''.join(b'\x00' + bytes([r,g,b] * w) for _ in range(h))
              idat = zlib.compress(raw)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
          with open('DepthTracker/Assets.xcassets/AppIcon.appiconset/icon_1024.png', 'wb') as f:
              f.write(make_png(1024, 1024, 0, 120, 200))
          "
          cat > "$ICON_DIR/Contents.json" << 'JSONEOF'
          {
            "images": [
              {
                "idiom": "universal",
                "platform": "ios",
                "size": "1024x1024",
                "filename": "icon_1024.png"
              }
            ],
            "info": {
              "author": "xcode",
              "version": 1
            }
          }
          JSONEOF
          mkdir -p "DepthTracker/Assets.xcassets"
          cat > "DepthTracker/Assets.xcassets/Contents.json" << 'JSONEOF'
          {
            "info": {
              "author": "xcode",
              "version": 1
            }
          }
          JSONEOF
      - name: Install XcodeGen and generate project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Increment build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number 6760527756 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "@file:$HOME/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8")
          NEW_BUILD=$((LATEST + 1))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW_BUILD" DepthTracker/Info.plist
          echo "Build number set to: $NEW_BUILD"
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
      - name: Publish to TestFlight
        script: |
          app-store-connect publish \
            --path $(find build/ios/ipa -name "*.ipa") \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "@file:$HOME/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8" \
            --testflight
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - jforde2015@gmail.com
        notify:
          success: true
          failure: true
