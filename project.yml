name: DepthTracker
options:
  bundleIdPrefix: com.jforde
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true
targets:
  DepthTracker:
    type: application
    platform: iOS
    sources:
      - DepthTracker
    dependencies: 
      - sdk: ARKit.framework
      - sdk: AVFoundation.framework
      - sdk: Vision.framework
      - sdk: CoreMotion.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jforde.DepthTracker
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: DepthTracker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
    info:
      path: DepthTracker/Info.plist
      properties:
        NSCameraUsageDescription: "Camera access is needed for body tracking and depth measurement."
        UIRequiredDeviceCapabilities:
          - arkit
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
